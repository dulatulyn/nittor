<a [routerLink]="['/movies', movie().id]" class="card">
  <div class="poster">
    @if (movie().poster_url) {
      <img [src]="movie().poster_url" [alt]="movie().title" loading="lazy" />
    } @else {
      <div class="poster-placeholder">{{ movie().title[0] }}</div>
    }
  </div>

  <div class="badges">
    <span class="rating" [class]="ratingClass">{{ movie().imdb_rating.toFixed(1) }}</span>
    @if (showTop10()) {
      <span class="top10">⚡ Top-10</span>
    }
  </div>

  <div class="hover-overlay">
    <span class="card-title">{{ movie().title }}</span>
  </div>
</a>
