<nav class="navbar">
  <div class="nav-left">
    <a routerLink="/" class="logo">NITTOR</a>
  </div>

  <div class="nav-center">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">main</a>
    <a routerLink="/category" routerLinkActive="active" class="nav-link">category</a>
  </div>

  <div class="nav-right">
    <a routerLink="/category" class="icon-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
    </a>

    <div class="user-menu">
      <button class="avatar" (click)="toggleDropdown()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"
          />
        </svg>
      </button>

      @if (dropdownOpen()) {
        <div class="dropdown">
          @if (auth.isLoggedIn()) {
            <span class="dropdown-username">{{ auth.username() }}</span>
            <a routerLink="/profile" class="dropdown-item" (click)="closeDropdown()">My profile</a>
            <button class="dropdown-item logout" (click)="logout()">Log Out</button>
          } @else {
            <a routerLink="/login" class="dropdown-item" (click)="closeDropdown()">Log In</a>
            <a routerLink="/register" class="dropdown-item" (click)="closeDropdown()">Register</a>
          }
        </div>
      }
    </div>
  </div>
</nav>
